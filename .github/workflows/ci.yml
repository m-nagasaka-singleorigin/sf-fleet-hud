name: CI

on:
  push:
  pull_request:

jobs:
  ip-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan working tree
        run: bash scripts/check-ip.sh
      - name: Scan full history
        run: bash scripts/check-ip.sh --history

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build registry
        run: pnpm registry:build
      - name: Build site
        run: pnpm build
