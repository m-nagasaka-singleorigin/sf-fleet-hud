name: CI

on:
  push:
  pull_request:

jobs:
  ip-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan working tree
        run: bash scripts/check-ip.sh
      - name: Scan full history
        run: bash scripts/check-ip.sh --history

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build registry
        run: pnpm registry:build
      # The build above regenerates public/r/*.json. If that changes anything,
      # the committed JSON was stale and consumers would install an older
      # component than the source in this repo.
      - name: Check registry output is up to date
        run: |
          if ! git diff --quiet -- public/r; then
            echo "::error::public/r is out of date — run 'pnpm registry:build' and commit the result."
            git diff --stat -- public/r
            exit 1
          fi
      - name: Build site
        run: pnpm build
